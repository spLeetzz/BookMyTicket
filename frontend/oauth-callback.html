<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>BookMyTicket - OAuth Complete</title>
    <link rel="stylesheet" href="./css/style.css" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="./js/tailwind-config.js"></script>
  </head>
  <body
    class="bg-surface text-on-surface font-body min-h-screen flex items-center justify-center selection:bg-primary/30 overflow-x-hidden"
  >
    <!-- Background Elements -->
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
      <div
        class="absolute -top-24 -left-24 w-96 h-96 bg-primary/10 blur-[120px] rounded-full animate-pulse"
      ></div>
      <div
        class="absolute -bottom-24 right-1/3 w-80 h-80 bg-primary/10 blur-[100px] rounded-full"
      ></div>
    </div>

    <main class="relative z-10 text-center">
      <div
        class="glass-panel p-12 rounded-2xl shadow-2xl border border-white/5 max-w-sm mx-auto"
      >
        <div class="mb-6 flex justify-center">
          <div
            class="w-16 h-16 bg-primary/20 rounded-full flex items-center justify-center border border-primary/30"
          >
            <span
              class="material-symbols-outlined text-primary text-4xl"
              style="font-variation-settings: &quot;FILL&quot; 1"
              >water_drop</span
            >
          </div>
        </div>
        <h1
          id="status"
          class="font-headline text-2xl font-extrabold mb-3 tracking-tight"
        >
          Login Successful
        </h1>
        <p class="text-on-surface-variant text-sm mb-8 leading-relaxed">
          Authentication was successful. You can now close this window or wait
          to be redirected.
        </p>
        <div
          class="w-full bg-surface-container-low h-1 rounded-full overflow-hidden"
        >
          <div
            class="bg-primary h-full animate-[progress_2s_ease-in-out_infinite]"
          ></div>
        </div>
      </div>
    </main>

    <style>
      @keyframes progress {
        0% {
          width: 0%;
          margin-left: 0%;
        }
        50% {
          width: 50%;
          margin-left: 25%;
        }
        100% {
          width: 0%;
          margin-left: 100%;
        }
      }
    </style>

    <script src="./js/oauth-callback.js"></script>
  </body>
</html>
