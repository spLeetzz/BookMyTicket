<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>BookMyTicket - Featured Events</title>
    <link rel="stylesheet" href="./css/style.css" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="./js/tailwind-config.js"></script>
  </head>

  <body class="bg-surface text-on-surface font-body selection:bg-primary/30">
    <!-- Background Accents -->
    <div class="fixed inset-0 pointer-events-none -z-10 overflow-hidden">
      <div
        class="absolute top-[-10%] left-[-10%] w-[60%] h-[60%] rounded-full bg-primary/5 blur-[120px] mix-blend-screen"
      ></div>
      <div
        class="absolute bottom-[-20%] right-[-10%] w-[70%] h-[70%] rounded-full bg-tertiary/5 blur-[150px] mix-blend-screen"
      ></div>
    </div>

    <div id="navbar-container" class="relative z-50"></div>

    <main class="pt-32 pb-32 px-6 max-w-7xl mx-auto">
      <!-- GitHub Link Section -->
      <div class="mb-16">
        <a
          href="https://github.com/spLeetzz/BookMyTicket"
          target="_blank"
          class="glass-panel px-8 py-6 rounded-3xl flex items-center justify-between group hover:border-primary transition-all duration-700 relative overflow-hidden"
        >
          <div
            class="absolute inset-0 bg-primary/5 opacity-0 group-hover:opacity-100 transition-opacity"
          ></div>
          <div class="flex items-center gap-6 relative z-10">
            <div
              class="w-14 h-14 bg-white/10 rounded-2xl flex items-center justify-center group-hover:bg-primary/20 transition-all group-hover:rotate-12"
            >
              <svg class="w-8 h-8 fill-white" viewBox="0 0 24 24">
                <path
                  d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"
                />
              </svg>
            </div>
            <div>
              <h4
                class="text-white font-headline text-xl font-extrabold tracking-tight mb-1"
              >
                Source Code Available
              </h4>
              <p
                class="text-primary font-mono text-sm tracking-tight opacity-80 group-hover:opacity-100 transition-opacity"
              >
                github.com/spLeetzz/BookMyTicket
              </p>
            </div>
          </div>
          <div
            class="flex items-center gap-2 text-on-surface-variant group-hover:text-primary transition-colors relative z-10"
          >
            <span
              class="text-xs font-bold uppercase tracking-widest hidden md:block"
              >Check on GitHub</span
            >
            <span
              class="material-symbols-outlined group-hover:translate-x-2 transition-transform"
              >arrow_right_alt</span
            >
          </div>
        </a>
      </div>

      <!-- Hero Section -->
      <section class="mb-12">
        <p
          class="font-headline text-primary font-bold tracking-widest text-xs uppercase mb-3"
        >
          EXPERIENCE THE DEPTH
        </p>
        <h2
          class="font-headline text-4xl md:text-6xl font-extrabold tracking-tighter text-on-surface mb-6"
        >
          Featured Events
        </h2>

        <!-- Hero Featured Card (Placeholder for now) -->
        <div
          class="relative w-full aspect-[16/9] md:aspect-[21/9] rounded-xl overflow-hidden group mb-12"
        >
          <img
            class="w-full h-full object-cover brightness-50 group-hover:scale-105 transition-transform duration-700 ease-in-out"
            src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&w=1600&q=80"
            alt="Featured Event"
          />
          <div
            class="absolute inset-0 bg-gradient-to-t from-surface-dim via-transparent to-transparent"
          ></div>
          <div class="absolute bottom-0 left-0 p-8 md:p-12 w-full md:w-2/3">
            <span
              class="inline-block px-3 py-1 rounded-full bg-primary text-on-primary text-[10px] font-bold uppercase tracking-wider mb-4"
              >Trending Now</span
            >
            <h3
              class="font-headline text-3xl md:text-5xl font-bold text-white mb-4 leading-tight"
            >
              Elite Music Festival 2026
            </h3>
            <div
              class="flex flex-wrap gap-6 text-on-surface-variant text-sm mb-8"
            >
              <span class="flex items-center gap-2"
                ><span class="material-symbols-outlined text-sm"
                  >calendar_today</span
                >
                Oct 24, 2026</span
              >
              <span class="flex items-center gap-2"
                ><span class="material-symbols-outlined text-sm"
                  >location_on</span
                >
                Grand Arena</span
              >
            </div>
          </div>
        </div>
      </section>

      <!-- Events Grid -->
      <section>
        <div class="flex justify-between items-end mb-8">
          <div>
            <h4 class="font-headline text-2xl font-bold text-white">
              All Events
            </h4>
            <p class="text-on-surface-variant text-sm">
              Find your next experience
            </p>
          </div>
        </div>
        <div
          id="events-grid"
          class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"
        >
          <!-- Injected by JS -->
          <div class="animate-pulse space-y-4">
            <div class="bg-surface-container-low aspect-video rounded-xl"></div>
            <div class="h-4 bg-surface-container-low rounded w-3/4"></div>
            <div class="h-4 bg-surface-container-low rounded w-1/2"></div>
          </div>
        </div>
      </section>
    </main>

    <div
      id="toast-container"
      class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 w-full max-w-sm"
    ></div>

    <script type="module" src="./js/ui.js"></script>
    <script type="module" src="./js/events.js"></script>
  </body>
</html>
