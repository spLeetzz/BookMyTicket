<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>BookMyTicket - Login</title>
    <link rel="stylesheet" href="./css/style.css" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="./js/tailwind-config.js"></script>
  </head>
  <body
    class="bg-surface text-on-surface font-body min-h-screen selection:bg-primary/30 overflow-x-hidden"
  >
    <!-- Refined Watery Background -->
    <div class="fixed inset-0 z-0 pointer-events-none">
      <div
        class="absolute inset-0 bg-[radial-gradient(circle_at_20%_0%,rgba(0,218,243,0.08)_0%,transparent_50%),radial-gradient(circle_at_80%_100%,rgba(0,218,243,0.05)_0%,transparent_50%)]"
      ></div>
      <div
        class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,rgba(17,20,23,0)_0%,rgba(17,20,23,0.8)_100%)]"
      ></div>
    </div>

    <div id="navbar-container" class="relative z-50"></div>

    <main
      class="relative z-10 min-h-screen flex items-center justify-center px-6 py-20 pt-32"
    >
      <div class="w-full max-w-lg">
        <!-- Login Form Container -->
        <div
          class="bg-surface-container-low rounded-[2rem] p-10 md:p-14 shadow-2xl border border-white/5"
        >
          <!-- Header Section -->
          <div class="mb-12 text-center">
            <h1
              class="font-headline text-5xl font-black tracking-tighter mb-4 text-white"
            >
              Welcome Back
            </h1>
            <p class="text-on-surface-variant font-medium text-lg opacity-80">
              Enter your credentials to kick the door.
            </p>
          </div>

          <form id="login-form" class="space-y-6">
            <!-- Email Field -->
            <div class="space-y-3">
              <label
                class="block text-xs font-bold text-primary uppercase tracking-[0.2em] ml-1"
                for="email"
              >
                Identified Email
              </label>
              <input
                class="w-full bg-surface-container/50 border border-white/5 py-5 px-6 focus:ring-2 focus:ring-primary/50 focus:bg-surface-container transition-all duration-300 text-white placeholder:text-outline-variant/40 rounded-2xl outline-none"
                id="email"
                name="email"
                placeholder="name@example.com"
                type="email"
                required
              />
            </div>

            <!-- Password Field -->
            <div class="space-y-3">
              <div class="flex justify-between items-center px-1">
                <label
                  class="block text-xs font-bold text-primary uppercase tracking-[0.2em]"
                  for="password"
                >
                  Password
                </label>
                <a
                  class="text-xs font-bold text-on-surface-variant hover:text-white transition-colors duration-300 uppercase tracking-widest"
                  href="#"
                >
                  Forgot?
                </a>
              </div>
              <input
                class="w-full bg-surface-container/50 border border-white/5 py-5 px-6 focus:ring-2 focus:ring-primary/50 focus:bg-surface-container transition-all duration-300 text-white placeholder:text-outline-variant/40 rounded-2xl outline-none"
                id="password"
                name="password"
                placeholder="••••••••"
                type="password"
                required
              />
            </div>

            <!-- Primary Action -->
            <button
              class="w-full bg-primary text-[#001216] font-black py-5 rounded-full text-xl shadow-[0_0_30px_rgba(0,218,243,0.3)] hover:shadow-[0_0_40px_rgba(0,218,243,0.5)] hover:scale-[1.02] transition-all duration-500 active:scale-[0.98] mt-8"
              type="submit"
            >
              Sign In
            </button>

            <!-- Divider -->
            <div class="relative flex items-center py-4">
              <div class="flex-grow border-t border-outline-variant/15"></div>
              <span
                class="flex-shrink mx-4 text-sm text-outline-variant uppercase tracking-widest font-semibold"
                >Or</span
              >
              <div class="flex-grow border-t border-outline-variant/15"></div>
            </div>

            <!-- Social Login -->
            <a
              href="#"
              id="google-oauth-btn"
              class="w-full flex items-center justify-center gap-3 bg-surface-variant/20 border border-outline-variant/20 hover:bg-surface-variant/40 text-on-surface font-semibold py-4 rounded-full transition-all duration-300"
            >
              <svg class="w-5 h-5" viewbox="0 0 24 24">
                <path
                  d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                  fill="#4285F4"
                ></path>
                <path
                  d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                  fill="#34A853"
                ></path>
                <path
                  d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                  fill="#FBBC05"
                ></path>
                <path
                  d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                  fill="#EA4335"
                ></path>
              </svg>
              Continue with Google
            </a>
          </form>

          <!-- Footer Links -->
          <div class="mt-10 text-center">
            <p class="text-on-surface-variant">
              Don't have an account?
              <a
                class="text-primary font-bold hover:underline underline-offset-4 decoration-primary/50 transition-all duration-300 ml-1"
                href="register.html"
                >Sign Up</a
              >
            </p>
          </div>
        </div>

        <!-- Footer Legal Branding -->
        <div
          class="mt-12 text-center text-outline-variant/60 text-xs tracking-widest uppercase font-medium"
        >
          BookMyTicket Security Protocol • 2026
        </div>
      </div>
    </main>

    <!-- Smooth Caustic Overlay -->
    <div
      class="fixed inset-0 pointer-events-none mix-blend-screen opacity-30 select-none"
    >
      <div
        class="absolute inset-0 bg-[radial-gradient(circle_at_50%_120%,rgba(0,218,243,0.1)_0%,transparent_70%)]"
      ></div>
    </div>

    <div
      id="toast-container"
      class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 w-full max-w-sm"
    ></div>

    <script type="module" src="./js/ui.js"></script>
    <script type="module" src="./js/auth.js"></script>
  </body>
</html>
